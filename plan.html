<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Matt's Reverse Deadline Planner</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 50%, #312e81 100%);
            min-height: 100vh;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        #root:empty::before {
            content: "Loading...";
            display: block;
            text-align: center;
            padding-top: 50px;
            color: rgba(255,255,255,0.5);
        }

        .error-box {
            background: rgba(220, 38, 38, 0.9);
            color: white;
            padding: 20px;
            margin: 20px;
            border-radius: 12px;
            text-align: center;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .glass-input:focus {
            outline: none;
            border-color: rgba(167, 139, 250, 0.5);
            background: rgba(0, 0, 0, 0.4);
        }
        input { font-size: 16px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. Dependency Check (React Only) ---
        if (!window.React || !window.ReactDOM) {
             document.getElementById('root').innerHTML = `
                <div class="error-box">
                    <h3>Error</h3>
                    <p>React could not load. Please check internet connection.</p>
                </div>
            `;
            throw new Error("React missing");
        }

        const { useState, useEffect, useRef } = React;
        
        // --- 2. EMBEDDED ICONS (No external download needed) ---
        const ICONS = {
            Clock: <path d="M12 6v6l4 2 M22 12A10 10 0 1 1 12 2a10 10 0 0 1 10 10z" />,
            AlertTriangle: <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z M12 9v4 M12 17h.01" />,
            CheckCircle: <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14 M22 4L12 14.01l-3-3" />,
            PartyPopper: <path d="M5.8 11.3 2 22l10.7-3.79 M4 3h.01 M22 8h.01 M15 2h.01 M22 20h.01 M22 2l-2.24.75a2.9 2.9 0 0 0-1.96 3v0a2.9 2.9 0 0 0 1.96 3L22 9.5V2z M11 13c1.93 1.93 2.83 4.17 2 5-.83.83-3.07-.07-5-2-1.93-1.93-2.83-4.17-2-5 .83-.83 3.07.07 5 2z" />,
            GripVertical: <path d="M9 12h1 M9 5h1 M9 19h1 M15 12h1 M15 5h1 M15 19h1" />,
            ArrowUp: <path d="M12 19V5 M5 12l7-7 7 7" />,
            ArrowDown: <path d="M12 5v14 M19 12l-7 7-7-7" />,
            Trash2: <path d="M3 6h18 M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6 M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2 M10 11v6 M14 11v6" />,
            Play: <polygon points="5 3 19 12 5 21 5 3" />,
            Check: <polyline points="20 6 9 17 4 12" />,
            RotateCcw: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8 M3 3v5h5" />,
            Plus: <path d="M12 5v14 M5 12h14" />
        };

        const Icon = ({ name, size = 20, className }) => {
            const path = ICONS[name];
            if (!path) return null;
            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {path}
                </svg>
            );
        };

        // --- 3. App Logic ---
        const timeToMins = (timeStr) => {
            if (!timeStr) return 0;
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        };

        const minsToTime = (totalMins) => {
            let m = totalMins % (24 * 60);
            if (m < 0) m += 24 * 60;
            const h = Math.floor(m / 60);
            const mins = m % 60;
            return `${h.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
        };

        const getCurrentTimeMins = () => {
            const now = new Date();
            return now.getHours() * 60 + now.getMinutes();
        };

        const App = () => {
            const [deadline, setDeadline] = useState("17:00");
            const [buffer, setBuffer] = useState(10);
            const [nowMins, setNowMins] = useState(getCurrentTimeMins());
            const [tasks, setTasks] = useState([
                { id: 1, name: "Research", duration: 30, status: "pending" },
                { id: 2, name: "Drafting", duration: 45, status: "pending" },
                { id: 3, name: "Review", duration: 15, status: "pending" }
            ]);

            useEffect(() => {
                const saved = localStorage.getItem('deadlinePlannerData_v3');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if(parsed.deadline) setDeadline(parsed.deadline);
                        if(parsed.buffer !== undefined) setBuffer(parsed.buffer);
                        if(parsed.tasks) setTasks(parsed.tasks);
                    } catch(e) {}
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('deadlinePlannerData_v3', JSON.stringify({ deadline, buffer, tasks }));
            }, [deadline, buffer, tasks]);

            useEffect(() => {
                const interval = setInterval(() => setNowMins(getCurrentTimeMins()), 10000); 
                return () => clearInterval(interval);
            }, []);

            const calculateSchedule = () => {
                const deadlineMins = timeToMins(deadline);
                const effectiveDeadline = deadlineMins - buffer;
                
                let runningEndTime = effectiveDeadline;
                const scheduledTasks = [];
                let totalDurationRemaining = 0;

                const reversedTasks = [...tasks].reverse();
                
                reversedTasks.forEach(task => {
                    const end = runningEndTime;
                    const start = end - task.duration;
                    if (task.status !== 'completed') totalDurationRemaining += task.duration;

                    scheduledTasks.unshift({
                        ...task,
                        plannedStart: start,
                        plannedEnd: end
                    });
                    
                    runningEndTime = start;
                });

                return { scheduledTasks, totalDurationRemaining };
            };

            const { scheduledTasks, totalDurationRemaining } = calculateSchedule();
            const activeOrNextTask = scheduledTasks.find(t => t.status !== 'completed');
            
            let delay = 0;
            if (activeOrNextTask) {
                delay = nowMins - activeOrNextTask.plannedStart;
            }
            const isLate = delay > 0;
            const remainingBuffer = buffer - (isLate ? delay : 0);
            const eta = minsToTime(nowMins + totalDurationRemaining);

            const addTask = () => setTasks([...tasks, { id: Date.now(), name: "", duration: 15, status: "pending" }]);
            const updateTask = (id, field, value) => setTasks(tasks.map(t => t.id === id ? { ...t, [field]: value } : t));
            const deleteTask = (id) => setTasks(tasks.filter(t => t.id !== id));
            
            const moveTask = (index, direction) => {
                const newTasks = [...tasks];
                if (direction === -1 && index > 0) {
                    [newTasks[index], newTasks[index - 1]] = [newTasks[index - 1], newTasks[index]];
                } else if (direction === 1 && index < newTasks.length - 1) {
                    [newTasks[index], newTasks[index + 1]] = [newTasks[index + 1], newTasks[index]];
                }
                setTasks(newTasks);
            };

            const setTaskStatus = (id, status) => {
                setTasks(tasks.map(t => {
                    if (t.id !== id) return status === 'active' && t.status === 'active' ? { ...t, status: 'pending' } : t;
                    return { ...t, status };
                }));
            };

            const dragItem = useRef();
            const dragOverItem = useRef();
            
            const onDragStart = (e, position) => {
                dragItem.current = position;
                e.target.style.opacity = '0.5';
            };
            const onDragEnter = (e, position) => dragOverItem.current = position;
            const onDragEnd = (e) => {
                e.target.style.opacity = '1';
                if (dragItem.current === null || dragOverItem.current === null) return;
                const copy = [...tasks];
                const content = copy[dragItem.current];
                copy.splice(dragItem.current, 1);
                copy.splice(dragOverItem.current, 0, content);
                dragItem.current = null;
                dragOverItem.current = null;
                setTasks(copy);
            };

            return (
                <div className="max-w-[500px] mx-auto p-4 pb-20">
                    <header className="mb-6 flex justify-between items-center">
                        <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                            <Icon name="Clock" className="text-purple-300" />
                            Deadline<span className="text-purple-300">Planner</span>
                        </h1>
                        <div className="text-right">
                            <div className="text-3xl font-mono font-bold leading-none">{minsToTime(nowMins)}</div>
                            <div className="text-xs text-purple-200 opacity-70">CURRENT TIME</div>
                        </div>
                    </header>

                    <div className="glass-panel rounded-2xl p-4 mb-4 flex gap-4">
                        <div className="flex-1">
                            <label className="block text-xs text-purple-200 mb-1 font-semibold uppercase">Target Deadline</label>
                            <input type="time" value={deadline} onChange={(e) => setDeadline(e.target.value)} className="glass-input w-full rounded-lg p-2 font-mono text-center text-lg" />
                        </div>
                        <div className="w-24">
                            <label className="block text-xs text-purple-200 mb-1 font-semibold uppercase">Buffer (m)</label>
                            <input type="number" value={buffer} onChange={(e) => setBuffer(Number(e.target.value))} className="glass-input w-full rounded-lg p-2 font-mono text-center text-lg" />
                        </div>
                    </div>

                    <div className={`glass-panel rounded-2xl p-5 mb-6 border-l-4 shadow-lg transition-colors duration-500 ${
                        !activeOrNextTask ? 'border-l-green-400 bg-green-900/20' :
                        remainingBuffer < 0 ? 'border-l-red-500 bg-red-900/20' : 
                        remainingBuffer < 15 ? 'border-l-yellow-400' : 'border-l-green-400'
                    }`}>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <div className="text-xs opacity-70 uppercase tracking-wider mb-1">Status</div>
                                {activeOrNextTask ? (
                                    <div className={`text-lg font-bold flex items-center gap-2 ${remainingBuffer < 0 ? 'text-red-300' : 'text-green-300'}`}>
                                        {remainingBuffer < 0 ? (
                                            <> <Icon name="AlertTriangle" size={18} /> Behind {Math.abs(remainingBuffer)}m </>
                                        ) : (
                                            <> <Icon name="CheckCircle" size={18} /> On Track </>
                                        )}
                                    </div>
                                ) : (
                                    <div className="text-lg font-bold text-green-300 flex items-center gap-2">
                                        <Icon name="PartyPopper" size={18} /> All Done!
                                    </div>
                                )}
                            </div>
                            <div className="text-right">
                                <div className="text-xs opacity-70 uppercase tracking-wider mb-1">Buffer Left</div>
                                <div className={`text-2xl font-mono font-bold ${remainingBuffer < 0 ? 'text-red-400' : 'text-white'}`}>
                                    {remainingBuffer}m
                                </div>
                            </div>
                            {activeOrNextTask && (
                                <div className="col-span-2 pt-3 border-t border-white/10 flex justify-between items-end">
                                    <div>
                                        <div className="text-xs opacity-70 mb-1">START NEXT STEP BY</div>
                                        <div className="text-xl font-mono font-bold text-yellow-300">{minsToTime(activeOrNextTask.plannedStart)}</div>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-xs opacity-70 mb-1">EST. FINISH</div>
                                        <div className="text-sm font-mono text-purple-200">{eta}</div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="space-y-3">
                        {scheduledTasks.map((task, index) => {
                            const isCompleted = task.status === 'completed';
                            const isActive = task.status === 'active';
                            let statusClass = "border-l-gray-500 opacity-80";
                            if (isActive) statusClass = "border-l-blue-500 bg-blue-900/20 scale-[1.02] shadow-xl opacity-100 ring-1 ring-blue-500/30";
                            if (isCompleted) statusClass = "border-l-green-500 bg-green-900/10 opacity-50";

                            return (
                                <div 
                                    key={task.id}
                                    draggable={!isActive && !isCompleted}
                                    onDragStart={(e) => onDragStart(e, index)}
                                    onDragEnter={(e) => onDragEnter(e, index)}
                                    onDragEnd={onDragEnd}
                                    className={`glass-panel rounded-xl p-3 border-l-4 transition-all duration-200 relative group ${statusClass}`}
                                >
                                    <div className="flex justify-between text-[10px] font-mono opacity-60 mb-1 px-1">
                                        <span>Start: {minsToTime(task.plannedStart)}</span>
                                        <span>End: {minsToTime(task.plannedEnd)}</span>
                                    </div>
                                    <div className="flex gap-2 items-center">
                                        <div className="cursor-move opacity-30 hover:opacity-100 p-1">
                                            <Icon name="GripVertical" size={16} />
                                        </div>
                                        <div className="flex-1 flex gap-2">
                                            <input type="text" value={task.name} onChange={(e) => updateTask(task.id, 'name', e.target.value)} placeholder="Task Name" className={`glass-input flex-1 rounded px-2 py-1 text-sm ${isCompleted ? 'line-through' : ''}`} />
                                            <div className="relative w-[60px]">
                                                <input type="number" value={task.duration} onChange={(e) => updateTask(task.id, 'duration', parseInt(e.target.value) || 0)} className="glass-input w-full rounded px-2 py-1 text-sm text-center" />
                                                <span className="absolute right-1 top-1.5 text-[8px] opacity-50 pointer-events-none">min</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-center mt-3 pl-7">
                                        <div className="flex gap-1">
                                            <button onClick={() => moveTask(index, -1)} className="p-1.5 rounded hover:bg-white/10 opacity-50"><Icon name="ArrowUp" size={14} /></button>
                                            <button onClick={() => moveTask(index, 1)} className="p-1.5 rounded hover:bg-white/10 opacity-50"><Icon name="ArrowDown" size={14} /></button>
                                            <button onClick={() => deleteTask(task.id)} className="p-1.5 rounded hover:bg-red-500/20 text-red-300 opacity-50"><Icon name="Trash2" size={14} /></button>
                                        </div>
                                        <div className="flex gap-2">
                                            {task.status === 'pending' && <button onClick={() => setTaskStatus(task.id, 'active')} className="bg-blue-600 hover:bg-blue-500 text-white text-xs px-3 py-1.5 rounded-md font-medium flex items-center gap-1 transition-colors"><Icon name="Play" size={12} /> Start</button>}
                                            {task.status === 'active' && <button onClick={() => setTaskStatus(task.id, 'completed')} className="bg-green-600 hover:bg-green-500 text-white text-xs px-3 py-1.5 rounded-md font-medium flex items-center gap-1 transition-colors"><Icon name="Check" size={12} /> Done</button>}
                                            {task.status === 'completed' && <button onClick={() => setTaskStatus(task.id, 'pending')} className="bg-white/10 hover:bg-white/20 text-white text-xs px-3 py-1.5 rounded-md font-medium flex items-center gap-1 transition-colors"><Icon name="RotateCcw" size={12} /> Restart</button>}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                    <button onClick={addTask} className="w-full mt-4 py-3 border-2 border-dashed border-white/20 rounded-xl text-white/50 hover:bg-white/5 hover:text-white hover:border-white/40 transition-all flex items-center justify-center gap-2 text-sm font-medium">
                        <Icon name="Plus" size={18} /> Add Task Step
                    </button>
                    <div className="mt-8 text-center text-xs text-white/20">Changes auto-saved to device</div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
